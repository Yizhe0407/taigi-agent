services:
  otp:
    image: docker.io/opentripplanner/opentripplanner:2.9.0
    ports:
      - "8081:8080"
    volumes:
      - ./data:/var/opentripplanner
    command: ["--load", "--serve"]
    restart: unless-stopped
    mem_limit: 2g
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx1536m -XX:+UseG1GC"
